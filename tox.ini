[tox]
envlist = format, test
skipsdist = False
skip_missing_interpreters = True
requires =
    tox-uv

[testenv:format]
description = Format code with black and ruff
deps =
    black>=23.0,<25.0
    ruff>=0.1.0
    isort>=5.0
commands =
    isort gladius/ tests/
    black gladius/ tests/
    ruff check gladius/ tests/ --fix --ignore E712
    ruff format gladius/ tests/

[testenv:test]
description = Run test suite with coverage
package = editable
deps =
    pytest>=9.0
    pytest-cov>=6.0
commands =
    pytest tests/ \
        --cov=gladius \
        --cov-report=term-missing \
        --cov-report=xml